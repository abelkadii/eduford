{% load static %}

<div id="overlay" class="hide" onclick="closeForm()"></div>
<div class="form-popup" id="myForm">
    <link rel="stylesheet" href="{% static 'core/css/book.css' %}">
    <div class="popup-header">
        <div></div>
        <h2>Book An Appointment</h2>
        <button type="button" class="popupcancel" id="cancel-button" onclick="closeForm()">
            <!-- <?xml version="1.0" encoding="utf-8"?> -->
            <svg fill="#000000" width="800px" height="800px" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 14.545L1.455 16 8 9.455 14.545 16 16 14.545 9.455 8 16 1.455 14.545 0 8 6.545 1.455 0 0 1.455 6.545 8z" fill-rule="evenodd"/>
            </svg>
        </button>
    </div>
    <form class="form" action="" method="POST" id="form">
        {% csrf_token %}
        <div class="form_label">
            <h3 class="form_text">Fill in your information</h3>
        </div>
        <div class="form_line">
            <div class="form_field half">
                <input placeholder="First Name *" id="username" name="fname" type="text" class="form_field_input" required value="{{ first_name }}">
            </div>
            <div class="form_field half">
                <input placeholder="Lasr Name *" id="password" name="laname" type="text" class="form_field_input" required value="{{ last_name }}">
            </div>
        </div>
        <div class="form_line">
            <div class="form_field full">
                <input placeholder="Email *" type="email" id="email" name="email" class="form_field_input" required value="{{ email }}">
            </div>
        </div>
        <div class="form_line">
            <div class="form_field full">
                <input placeholder="Phone Number *" type="phone" id="phone" name="phone" class="form_field_input" required>
            </div>
        </div>
        <div class="form_label mgt-10">
            <h3 class="form_text">Select the time and date of the appointement</h3>
        </div>
        <div class="form_line">
            <div class="form_field full">
                <input type="date" id="date" name="date" class="form_field_input" required>
            </div>
        </div>
        <div class="form_line">
            <div class="form_field full">
                <input type="time" id="time" name="time" class="form_field_input" required>
            </div>
        </div>
        
        <div class="form_line">
            <div class="form_field full flex">
                <button type="submit" id="form_button" class="form_button">Book</button>
            </div>
        </div>
    </form>
</div>
<script>
        function sleep(milliseconds) {
    const start = new Date().getTime();
    while (new Date().getTime() - start < milliseconds);
    }

    function openForm() {
        document.getElementById("myForm").style.display = "block";
        document.getElementById('overlay').classList.remove('hide');
        let body = document.getElementsByTagName('body')[0];
        body.style.overflow = 'hidden';
    }
    
    function clearInputs() {
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('email').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('date').value = '';
        document.getElementById('time').value = '';
    }
    function closeForm() {
        document.getElementById("myForm").style.display = "none";
        document.getElementById('overlay').classList.add('hide');
        let body = document.getElementsByTagName('body')[0];
        body.style.overflow = 'auto';
    }
    let form = document.getElementById('form');
    form.onsubmit = function(e){
        e.preventDefault();
        let submit_button = document.getElementById('form_button');
        submit_button.disabled = true;
        submit_button.innerHTML = 'Booking...';
        let data = new FormData(e.target);
        fetch('/book', {
            method: 'POST',
            body: data
        }).then(response => response.json())
        .then(data => {     
        let submit_button = document.getElementById('form_button');
        if(data['status'] == 'success'){
            window.location.href = data.redirect
            submit_button.innerHTML = 'Booked';
            setTimeout(() => {
                submit_button.innerHTML = 'Book';
                submit_button.disabled = false;
                closeForm();
                clearInputs(); 
                alert('Appointment booked successfully');
            }, 1000);
        }else{
            submit_button.innerHTML = 'Book';
            submit_button.disabled = false;
            alert(data.message || 'Appointment booking failed');
        }
        }).catch(() => {
            let submit_button = document.getElementById('form_button');
            submit_button.innerHTML = 'Book';
            submit_button.disabled = false;
            alert('Appointment booking failed');
        });
    }
    
</script>
